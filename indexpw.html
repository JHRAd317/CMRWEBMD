<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Protected Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        justify-content: center;
        align-items: center;
    }
    #login-box, #content {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.15);
        width: 90%;
        max-width: 400px;
    }
    #content { display: none; }
    input[type="password"] {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 16px;
    }
    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #0078D4;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover {
        background: #005fa3;
    }
</style>

</head>
<body>

<div id="login-box">
    <h2>Enter Password</h2>
    <input id="pw" type="password" placeholder="Password">
    <button onclick="checkPassword()">Unlock</button>
    <p id="error" style="color:red; display:none; margin-top:10px;">Incorrect password</p>
</div>

<div id="content">
    <!-- ⭐ Your real page content goes here ⭐ -->
    <h1>Welcome</h1>
    <p>Your protected content is now visible.</p>
</div>

<script>
    function checkPassword() {
        const input = document.getElementById("pw").value;
        const correct = "CMR2026!";

        if (input === correct) {
            document.getElementById("login-box").style.display = "none";
            document.getElementById("content").style.display = "block";
        } else {
            document.getElementById("error").style.display = "block";
        }
    }
</script>

</body>
</html>
