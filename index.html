<script>
function runMacro(macro) {
    let commands = macro.split(/\s+/);
    commands.forEach(command => {
        if(command === '{TAB}') {
            focusNext();
        } else if(command === '{ENTER}') {
            pressEnter();
        } else if(command.startsWith('{SLEEP ')) {
            let sleepTime = command.match(/\d+/);
            if(sleepTime) {
                setTimeout(() => {}, parseInt(sleepTime[0]) * 1000);
            }
        } else {
            let btn = document.querySelector(`[data-macro='${command}']`);
            if(btn) btn.click();
        }
    });
}

function focusNext() {
    let current = document.activeElement; 
    let inputs = document.querySelectorAll('input, textarea, [contenteditable="true"]');
    let index = Array.prototype.indexOf.call(inputs, current);
    if (index > -1 && index < inputs.length - 1) {
        inputs[index + 1].focus();
    }
}

function pressEnter() {
    let event = new KeyboardEvent('keypress', { key: 'Enter' });
    document.activeElement.dispatchEvent(event);
}

// Assuming there are functions to map button labels to payloads
const buttonLabels = {
    'Button1': 'Payload1',
    'Button2': 'Payload2',
    'Button3': 'Payload3',
    'Button4': 'Payload4',
    'Button5': 'Payload5',
    'Button6': 'Payload6',
    'Button7': 'Payload7',
    'Button8': 'Payload8',
    'Button9': 'Payload9',
    'Button10': 'Payload10',
    'Button11': 'Payload11',
};

// Update each button's data-macro accordingly
Object.keys(buttonLabels).forEach(label => {
    let btn = document.querySelector(`button[data-label='${label}']`);
    if (btn) {
        btn.setAttribute('data-macro', buttonLabels[label]);
    }
});
</script>
